name: Move Linked Issues to "In PR Review"

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review]

jobs:
  update-project-status:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to "In PR Review"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;
            const repo = context.repo;

            console.log(`Processing PR #${prNumber}`);
            console.log(`PR body: ${prBody}`);

            // Extract issue numbers from PR description
            // Matches: closes #123, fixes #123, resolves #123, #123, etc.
            const issuePattern = /(?:closes?|fixes?|resolves?|refs?|references?)?\s*#(\d+)/gi;
            const matches = [...prBody.matchAll(issuePattern)];
            const issueNumbers = [...new Set(matches.map(m => parseInt(m[1])))];

            if (issueNumbers.length === 0) {
              console.log('No linked issues found in PR description.');
              return;
            }

            console.log(`Found linked issues: ${issueNumbers.join(', ')}`);

            // -------------------------------------------------------
            // CONFIGURATION — fill these in after running the GraphQL
            // query described in the README steps below.
            // -------------------------------------------------------
            const PROJECT_NUMBER = 1;
            const PROJECT_OWNER = 'aarbanas';

            // Fetch project metadata (id, status field id, "In PR Review" option id)
            const projectQuery = await github.graphql(`
              query {
                user(login: "${PROJECT_OWNER}") {
                  projectV2(number: ${PROJECT_NUMBER}) {
                    id
                    fields(first: 30) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const project = projectQuery.user.projectV2;
            const projectId = project.id;

            // Find the Status field
            const statusField = project.fields.nodes.find(
              f => f.name && f.name.toLowerCase() === 'status'
            );

            if (!statusField) {
              console.log('No "Status" field found in the project.');
              return;
            }

            // Find the "In PR Review" option (case-insensitive)
            const inPrReviewOption = statusField.options.find(
              o => o.name.toLowerCase().replace(/\s+/g, ' ').trim() === 'in pr review'
            );

            if (!inPrReviewOption) {
              console.log(
                `"In PR Review" option not found. Available options: ${statusField.options.map(o => o.name).join(', ')}`
              );
              return;
            }

            console.log(`Project ID: ${projectId}`);
            console.log(`Status field ID: ${statusField.id}`);
            console.log(`"In PR Review" option ID: ${inPrReviewOption.id}`);

            // Process each linked issue
            for (const issueNumber of issueNumbers) {
              try {
                // Get the issue's node ID
                const issueQuery = await github.graphql(`
                  query {
                    repository(owner: "${repo.owner}", name: "${repo.repo}") {
                      issue(number: ${issueNumber}) {
                        id
                        title
                      }
                    }
                  }
                `);

                const issue = issueQuery.repository.issue;
                if (!issue) {
                  console.log(`Issue #${issueNumber} not found.`);
                  continue;
                }

                console.log(`Processing issue #${issueNumber}: "${issue.title}"`);

                // Find the project item for this issue
                const itemQuery = await github.graphql(`
                  query {
                    node(id: "${issue.id}") {
                      ... on Issue {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                            }
                          }
                        }
                      }
                    }
                  }
                `);

                const projectItems = itemQuery.node.projectItems.nodes;
                const projectItem = projectItems.find(item => item.project.id === projectId);

                let itemId;

                if (!projectItem) {
                  console.log(`Issue #${issueNumber} is not in the project yet. Adding it...`);
                  // Add the issue to the project first
                  const addResult = await github.graphql(`
                    mutation {
                      addProjectV2ItemById(input: {
                        projectId: "${projectId}"
                        contentId: "${issue.id}"
                      }) {
                        item {
                          id
                        }
                      }
                    }
                  `);
                  itemId = addResult.addProjectV2ItemById.item.id;
                  console.log(`Added issue #${issueNumber} to project. Item ID: ${itemId}`);
                } else {
                  itemId = projectItem.id;
                  console.log(`Found existing project item for issue #${issueNumber}: ${itemId}`);
                }

                // Update the status to "In PR Review"
                await github.graphql(`
                  mutation {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: "${projectId}"
                      itemId: "${itemId}"
                      fieldId: "${statusField.id}"
                      value: {
                        singleSelectOptionId: "${inPrReviewOption.id}"
                      }
                    }) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `);

                console.log(`✅ Issue #${issueNumber} status updated to "In PR Review"`);

              } catch (err) {
                console.error(`❌ Failed to update issue #${issueNumber}: ${err.message}`);
              }
            }
